<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抖音数据提取</title>
  <!-- 飞书多维表格插件 SDK -->
  <script src="https://lf-short.bitage.net/obj/bitae-short/bitable.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: #1f2329;
      background: #ffffff;
      padding: 16px;
      line-height: 1.5;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eaecec;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3370ff 0%, #2563eb 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #1f2329;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: #1f2329;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dee0e3;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: #3370ff;
      box-shadow: 0 0 0 2px rgba(51, 112, 255, 0.15);
    }

    .form-input::placeholder {
      color: #8f959e;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: #3370ff;
      color: white;
    }

    .btn-primary:hover {
      background: #2860e1;
    }

    .btn-primary:active {
      background: #1d4fb8;
    }

    .btn-primary:disabled {
      background: #c9cdd4;
      cursor: not-allowed;
    }

    .btn-text {
      background: transparent;
      color: #3370ff;
      padding: 6px 12px;
      font-size: 13px;
    }

    .btn-text:hover {
      background: rgba(51, 112, 255, 0.1);
    }

    .status-area {
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .status-area.show {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .status-loading {
      background: #e8f3ff;
      color: #3370ff;
    }

    .status-success {
      background: #e3f9e5;
      color: #1da745;
    }

    .status-error {
      background: #ffeceb;
      color: #f5483b;
    }

    .status-icon {
      flex-shrink: 0;
      font-size: 16px;
    }

    .status-text {
      flex: 1;
      word-break: break-word;
    }

    .result-card {
      border: 1px solid #eaecec;
      border-radius: 8px;
      padding: 12px;
      background: #fafbfc;
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 600;
      color: #1f2329;
    }

    .result-item {
      display: flex;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #eaecec;
    }

    .result-item:last-child {
      border-bottom: none;
    }

    .result-label {
      min-width: 70px;
      color: #8f959e;
      font-size: 12px;
    }

    .result-value {
      flex: 1;
      color: #1f2329;
      font-size: 13px;
      word-break: break-word;
    }

    .result-cover {
      width: 120px;
      height: 120px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid #eaecec;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #eaecec;
      border-top-color: #3370ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .help-tip {
      font-size: 12px;
      color: #8f959e;
      padding: 8px 12px;
      background: #f7f8fa;
      border-radius: 6px;
      line-height: 1.6;
    }

    .help-tip a {
      color: #3370ff;
      text-decoration: none;
    }

    .help-tip a:hover {
      text-decoration: underline;
    }

    .divider {
      height: 1px;
      background: #eaecec;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="header-icon">🎵</div>
      <div class="header-title">抖音数据提取</div>
    </div>

    <!-- 输入区域 -->
    <div class="form-group">
      <label class="form-label">抖音视频链接</label>
      <input
        type="text"
        class="form-input"
        id="videoUrl"
        placeholder="粘贴抖音分享链接，如：https://v.douyin.com/xxxxx/"
      />
    </div>

    <!-- 提示 -->
    <div class="help-tip">
      💡 支持链接格式：<br>
      • 抖音分享链接 (https://v.douyin.com/xxx/)<br>
      • 抖音完整链接 (https://www.douyin.com/video/xxx)
    </div>

    <!-- 操作按钮 -->
    <button class="btn btn-primary" id="extractBtn">
      <span>提取数据</span>
    </button>

    <!-- 状态提示 -->
    <div class="status-area" id="statusArea">
      <span class="status-icon" id="statusIcon"></span>
      <span class="status-text" id="statusText"></span>
    </div>

    <!-- 结果预览 -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span>📊 提取结果预览</span>
      </div>
      <div class="result-item">
        <div class="result-label">作者</div>
        <div class="result-value" id="previewAuthor">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">发布时间</div>
        <div class="result-value" id="previewTime">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">点赞</div>
        <div class="result-value" id="previewLike">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">评论</div>
        <div class="result-value" id="previewComment">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">转发</div>
        <div class="result-value" id="previewShare">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">播放</div>
        <div class="result-value" id="previewPlay">-</div>
      </div>
      <div class="result-item">
        <div class="result-label">封面</div>
        <img class="result-cover" id="previewCover" src="" alt="封面图" />
      </div>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
